name: CI

on:
  pull_request:
  push:
    branches:
      - main
      - master

jobs:
  backend:
    runs-on: ubuntu-latest
    env:
      SECRET_KEY: ci-secret-key
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install uv
        run: python -m pip install uv

      - name: Sync dependencies
        run: uv sync

      - name: Run tests
        run: uv run pytest

      - name: Migration scripts check
        run: |
          uv run alembic heads
          uv run alembic history

  frontend:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: web
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: "20"

      - name: Setup pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 10

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Lint
        run: pnpm lint

      - name: Build
        run: pnpm build
